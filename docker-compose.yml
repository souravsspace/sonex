version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sonex-postgres
    environment:
      POSTGRES_USER: sonex_user
      POSTGRES_PASSWORD: sonex_dev_password
      POSTGRES_DB: sonex_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonex_user -d sonex_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sonex-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sonex_minio
      MINIO_ROOT_PASSWORD: sonex_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
